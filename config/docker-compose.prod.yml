services:
  transkription-webapp:
    build:
      context: ..
      dockerfile: Dockerfile
    image: transkription-webapp:prod
    container_name: transkription-webapp
    restart: unless-stopped
    networks:
      - web
      - internal
    # SECURITY: In production behind Traefik, the `web` network + traefik
    # labels above are sufficient — there is no need to publish 3000 on the
    # host. Direct host exposure (a) bypasses Traefik's TLS/headers and
    # (b) lets clients spoof X-Forwarded-For because the immediate socket
    # peer is no longer a private-network proxy (see lib/network-guard.js).
    # Set WEBAPP_HOST_PORT explicitly (e.g. 127.0.0.1:3000) ONLY for local
    # dev, on-host troubleshooting, or topologies without Traefik. The
    # block is commented out by default; uncomment + set the env var
    # consciously.
    # ports:
    #   - "127.0.0.1:${WEBAPP_HOST_PORT:-3000}:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.transkription.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.transkription.entrypoints=websecure"
      - "traefik.http.routers.transkription.tls.certresolver=letsencrypt"
      - "traefik.http.services.transkription.loadbalancer.server.port=3000"
    volumes:
      # Uploads: Named Volume (Standard) oder Host-Pfad (z.B. Storage Box)
      # Setze UPLOADS_PATH=/mnt/storage-box/ghosttyper/uploads in .env für Storage Box
      - ${UPLOADS_PATH:-transkription-uploads}:/app/uploads
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=/api
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@transkription-db:5432/${DB_NAME}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://${DOMAIN}}
      - APP_PUBLIC_URL=${APP_PUBLIC_URL:-http://transkription-webapp:3000}
      # Operator default for the Mistral Voxtral key used by the live/Vexa
      # transcription bridge. The admin UI in
      # /settings/organization/integrations can override this — the bridge
      # picks up the override via /api/internal/whisper-config.
      # Same key the batch-transcription path uses, so a single MISTRAL_API_KEY
      # ENV is enough for both paths.
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-${VEXA_TRANSCRIPTION_TOKEN:-}}
      - BRIDGE_SHARED_SECRET=${BRIDGE_SHARED_SECRET}
      - AUTH_CREDENTIALS_ENABLED=${AUTH_CREDENTIALS_ENABLED:-false}
      - OIDC_PROVIDER_NAME=${OIDC_PROVIDER_NAME:-Single Sign-On}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - DB_INIT_SECRET=${DB_INIT_SECRET}
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY}
      - ENABLE_DB_INIT_API=${ENABLE_DB_INIT_API:-false}
      - PDF_CHROMIUM_PATH=${PDF_CHROMIUM_PATH:-/usr/bin/chromium-browser}
      # SECURITY: Default-on Chromium sandbox. PDF rendering takes
      # editor-supplied HTML; running Chromium without sandbox in that
      # context turns a renderer bug into container RCE. Override only
      # in environments where the container itself cannot grant the
      # required capabilities (e.g. unprivileged podman without
      # CAP_SYS_ADMIN), and accept the risk explicitly.
      - PDF_CHROMIUM_NO_SANDBOX=${PDF_CHROMIUM_NO_SANDBOX:-false}
      - RATE_LIMIT_STORE=${RATE_LIMIT_STORE:-db}
      - RATE_LIMIT_TRUST_PROXY=${RATE_LIMIT_TRUST_PROXY:-true}
      - HTTP_CLIENT_TIMEOUT_MS=${HTTP_CLIENT_TIMEOUT_MS:-30000}
      - HEALTH_DETAILS_PUBLIC=${HEALTH_DETAILS_PUBLIC:-false}
      - VEXA_BASE_URL=${VEXA_BASE_URL:-http://vexa-lite:8056}
      - RECONCILE_API_SECRET=${RECONCILE_API_SECRET:-}
    depends_on:
      transkription-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  transkription-db:
    image: postgres:16-alpine
    container_name: transkription-db
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - transkription-db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Vexa Remote-Meeting integration (opt-in via `--profile vexa`).
  #
  # Two-tier opt-in:
  #   1. Operator activates the compose profile (here)
  #   2. Org-Admin enables `organization_integrations.vexa.enabled` in-app
  #
  # Without the profile, none of these services run — GhostTyper works fine
  # without them. Without the in-app toggle, no bot is ever started even if
  # the container is up. The button in the UI is hidden until both are true.
  # ---------------------------------------------------------------------------
  vexa-db-init:
    image: postgres:16-alpine
    profiles: ["vexa"]
    networks: [internal]
    restart: "no"
    depends_on:
      transkription-db:
        condition: service_healthy
    environment:
      - PGPASSWORD=${DB_PASSWORD}
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        # Refresh collation on template1 in case the volume was bootstrapped
        # against a different libc/glibc baseline (alpine vs debian, etc.).
        psql -h transkription-db -U ${DB_USER} -d postgres \
          -c "ALTER DATABASE template1 REFRESH COLLATION VERSION" || true
        psql -h transkription-db -U ${DB_USER} -d postgres \
          -tc "SELECT 1 FROM pg_database WHERE datname='vexa'" \
          | grep -q 1 \
          || psql -h transkription-db -U ${DB_USER} -d postgres \
            -c "CREATE DATABASE vexa OWNER ${DB_USER}"

  # Tiny proxy that rewrites Vexa's hardcoded model name (whisper-1 /
  # large-v3-turbo) to Mistral Voxtral's *realtime* id
  # (`voxtral-mini-transcribe-realtime-2602`) and forwards to
  # https://api.mistral.ai/v1/audio/transcriptions. Realtime is a
  # drop-in replacement for `voxtral-mini-latest` (same endpoint, same
  # multipart shape, same per-minute price) but is fine-tuned for
  # low-latency live transcription — pairing it with the live-
  # translation companion-tab keeps us inside the ≤5 s end-to-end
  # window. The bridge also injects the workspace-global context_bias
  # and defaults response_format=verbose_json + timestamp_granularities=word
  # so Vexa gets segments + speaker_id + words[] regardless of what it
  # sends.
  voxtral-bridge:
    build:
      context: ../services/voxtral-bridge
      dockerfile: Dockerfile
    image: voxtral-bridge:prod
    container_name: transkription-voxtral-bridge
    restart: unless-stopped
    profiles: ["vexa"]
    networks: [internal]
    mem_limit: 256m
    environment:
      - UPSTREAM_URL=${VEXA_TRANSCRIPTION_URL:-https://api.mistral.ai/v1/audio/transcriptions}
      - MODEL_OVERRIDE=${VEXA_TRANSCRIPTION_MODEL:-voxtral-mini-transcribe-realtime-2602}
      - UPSTREAM_TIMEOUT_S=${VEXA_TRANSCRIPTION_TIMEOUT_S:-120}
      # Webapp callback so the Mistral key set in the admin UI takes
      # effect at runtime (cached ~60s). Falls back to MISTRAL_API_KEY.
      - WEBAPP_URL=http://transkription-webapp:3000
      - BRIDGE_SECRET=${BRIDGE_SHARED_SECRET}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-${VEXA_TRANSCRIPTION_TOKEN:-}}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://0.0.0.0:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  vexa-lite:
    # Default tracks upstream Vexa-Lite (Meet/Teams/Zoom only).
    # To enable Nextcloud Talk, set in .env:
    #   VEXA_LITE_IMAGE=ghcr.io/helge7925/vexa-bot-talk:0.10.0-talk.1
    # The forked image is built from
    #   https://github.com/helge7925/vexa, branch
    #   feat/nextcloud-talk-adapter, via the
    #   .github/workflows/build-vexa-bot-talk.yml workflow.
    # See helge7925/vexa/UPSTREAM-SYNC.md for the tag-naming scheme
    # and rebase procedure.
    image: ${VEXA_LITE_IMAGE:-vexaai/vexa-lite:0.10.0-260430-1701}
    container_name: transkription-vexa-lite
    restart: unless-stopped
    profiles: ["vexa"]
    networks: [internal]
    # Vexa-Dashboard läuft inside the all-in-one vexa-lite image auf
    # Port 3000. Standard-Bind ist localhost-only — als Operator-Tool
    # gedacht (Bot-Health, VNC, Live-Transcript-Debug). Auth läuft über
    # Vexa's eigenen admin-api-Token, NICHT über GhostTyper-NextAuth.
    # Für externen Zugriff: hinter SSH-Tunnel oder Traefik mit eigener
    # Auth davorsetzen, oder den 127.0.0.1-Prefix entfernen.
    ports:
      - "127.0.0.1:${VEXA_DASHBOARD_HOST_PORT:-3300}:3000"
    mem_limit: 2g
    cpus: 2
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@transkription-db:5432/vexa
      - DB_SSL_MODE=disable
      - TRANSCRIPTION_SERVICE_URL=http://voxtral-bridge:8080/v1/audio/transcriptions
      - TRANSCRIPTION_SERVICE_TOKEN=${VEXA_TRANSCRIPTION_TOKEN}
      - ADMIN_API_TOKEN=${VEXA_ADMIN_API_TOKEN}
    depends_on:
      transkription-db:
        condition: service_healthy
      vexa-db-init:
        condition: service_completed_successfully
      voxtral-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://0.0.0.0:8056/docs >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  transkription-uploads:
  transkription-db-data:

networks:
  web:
    external: true
  internal:
    external: false
