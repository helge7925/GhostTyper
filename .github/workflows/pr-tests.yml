name: PR Unit Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node --no-warnings --test tests/documents-access.test.mjs tests/chat-citations.test.mjs tests/chat-stream-utils.test.mjs tests/chat-actions-utils.test.mjs
        env:
          # Skip DB-dependent tests in PR CI (they require DATABASE_URL)
          DATABASE_URL: ''
