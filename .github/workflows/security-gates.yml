name: Security Gates

on:
  push:
  pull_request:
  schedule:
    - cron: '15 4 * * 1'

permissions:
  contents: read
  # pull-requests: read lets gitleaks-action@v2 call
  # GET /repos/.../pulls/N/commits on pull_request events so it can scan
  # only the PR's own commits. Without it the action fails fast with
  # "Resource not accessible by integration" — push-event runs are
  # unaffected because they use the contents:read scope only.
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (high)
        run: node --max-old-space-size=4096 npm audit --audit-level=high --omit=dev

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Absolute path is the safe form — `gitleaks-action@v2` does not
          # always resolve the relative `gitleaks.toml` against the repo
          # root, which is why our allowlist was being ignored in CI.
          GITLEAKS_CONFIG: ${{ github.workspace }}/gitleaks.toml
